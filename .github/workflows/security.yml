name: Security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit (requirements-voice.txt)
        run: |
          pip install pip-audit
          # transformers 4.x advisories accepted: coqui-tts needs <5; we only run local XTTS
          pip-audit -r requirements-voice.txt \
            --ignore-vuln PYSEC-2025-217 \
            --ignore-vuln PYSEC-2026-2290 \
            --ignore-vuln PYSEC-2026-2288 \
            --ignore-vuln PYSEC-2026-2289 \
            --ignore-vuln CVE-2025-14929 \
            --ignore-vuln CVE-2026-5241 \
            --ignore-vuln CVE-2026-1839 \
            --ignore-vuln CVE-2026-4372

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
